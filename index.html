<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urban Catalyst Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Alumni+Sans:wght@300;500;700&family=Bevan&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>URBAN</h2>
    <nav>
      <a class="active">DASHBOARD</a>
      <a>SERVICES</a>
      <a>INSIGHTS</a>
      <a>CLIENTS</a>
      <a>CONTACT</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <h1>DATA THAT DRIVES DECISIONS</h1>
      <button class="primary">REQUEST SAMPLE</button>
    </header>

    <!-- STATS -->
    <section class="stats">
      <div class="card">
        <h3>2000+</h3>
        <p>RESPONDENTS</p>
      </div>
      <div class="card">
        <h3>50+</h3>
        <p>GLOBAL PROJECTS</p>
      </div>
      <div class="card">
        <h3>15+</h3>
        <p>INDUSTRIES</p>
      </div>
      <div class="card">
        <h3>98%</h3>
        <p>DATA ACCURACY</p>
      </div>
    </section>

    <!-- CHARTS -->
    <section class="charts">
      <div class="chart-box">
        <canvas id="chart1"></canvas>
      </div>
      <div class="chart-box">
        <canvas id="chart2"></canvas>
      </div>
    </section>

    <!-- SERVICES -->
    <section class="services">
      <h2>SERVICES</h2>

      <div class="grid">
        <div class="card">QUANTITATIVE RESEARCH</div>
        <div class="card">QUALITATIVE RESEARCH</div>
        <div class="card">CONSUMER INSIGHTS</div>
        <div class="card">DATA ANALYTICS</div>
        <div class="card">B2B RESEARCH</div>
      </div>
    </section>

    <!-- FORM -->
    <section class="contact">
      <h2>START RESEARCH</h2>

      <form>
        <input placeholder="NAME">
        <input placeholder="COMPANY">
        <input type="email" placeholder="EMAIL">
        <textarea placeholder="MESSAGE"></textarea>

        <button class="primary">START RESEARCH</button>
      </form>
    </section>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
