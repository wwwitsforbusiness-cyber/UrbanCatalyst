<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>urban catalyst | smarter decisions</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="cursor"></div>
    <canvas id="canvas-bg"></canvas>
    
    <header>
        <div class="logo-container">
            <span class="logo-text">urban catalyst</span>
        </div>
        <nav>
            <a href="#insights">insights</a>
            <a href="#map">reach</a>
            <a href="#contact" class="nav-cta">get started</a>
        </nav>
    </header>

    <section class="hero">
        <div class="badge">ai powered analytics</div>
        <h1 class="gradient-text">urban catalyst</h1>
        <p class="tagline">insights that drive smarter decisions</p>
        <div class="hero-actions">
            <button class="primary-btn pulse" onclick="showPopup()">explore dashboard</button>
            <button class="secondary-btn">view case studies</button>
        </div>
    </section>

    <section id="insights" class="section">
        <h2 class="title">market intelligence</h2>
        <div class="chart-container">
            <div class="chart">
                <div class="bar-group"><div class="bar" data-h="85%"><span>85%</span></div><label>growth</label></div>
                <div class="bar-group"><div class="bar" data-h="60%"><span>60%</span></div><label>reach</label></div>
                <div class="bar-group"><div class="bar" data-h="92%"><span>92%</span></div><label>accuracy</label></div>
            </div>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="contact-card">
            <h2>ready for smarter decisions?</h2>
            <p>join 500+ global partners today</p>
            <div class="input-group">
                <input type="email" placeholder="enter work email">
                <button class="glow-on-hover">connect</button>
            </div>
        </div>
    </section>

    <div id="popup" class="overlay">
        <div class="popup-box">
            <div class="icon-circle">✓</div>
            <h2>intelligence unlocked</h2>
            <p>our q1 market report is now available for download</p>
            <button class="close-btn" onclick="closePopup()">continue</button>
        </div>
    </div>
</body>
</html>
